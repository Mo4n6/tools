<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      (function redirectToSpaEntry(location) {
        var path = location.pathname + location.search + location.hash;
        var normalizedPath = path.replace(/&/g, '~and~');
        var segments = location.pathname.replace(/^\/+|\/+$/g, '').split('/').filter(Boolean);
        var basePath = '/';

        if (segments.length > 0) {
          if (segments[0] === 'tools') {
            basePath = '/tools/';
          } else {
            basePath = '/' + segments[0] + '/';
          }
        }

        location.replace(basePath + '?/' + normalizedPath.replace(/^\//, ''));
      }(window.location));
    </script>
  </head>
  <body></body>
</html>
